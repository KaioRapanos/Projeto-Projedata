spring:
  application:
    name: production-control

  datasource:
    url: jdbc:postgresql://localhost:5433/production_control
    username: postgres
    password: 123456

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080